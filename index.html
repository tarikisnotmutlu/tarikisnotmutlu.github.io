<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f0f">
<title>Skill Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #222;
    --border: #2a2a2a;
    --text: #f0f0f0;
    --muted: #666;
    --subtle: #333;
    --german: #f59e0b;
    --german-bg: rgba(245,158,11,0.1);
    --dp100: #818cf8;
    --dp100-bg: rgba(129,140,248,0.1);
    --green: #34d399;
    --red: #f87171;
    --radius: 12px;
    --radius-sm: 8px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    overscroll-behavior: none;
  }

  /* ── Header ── */
  .header {
    position: sticky; top: 0; z-index: 50;
    background: rgba(15,15,15,0.9);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 14px 16px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .header-title { font-size: 17px; font-weight: 700; letter-spacing: -0.3px; }
  .header-btns { display: flex; gap: 8px; }
  .icon-btn {
    width: 36px; height: 36px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── Track tabs ── */
  .track-tabs {
    display: flex; gap: 6px; padding: 10px 12px;
    flex-wrap: wrap;
  }
  .track-tab {
    flex: 1 1 110px; max-width: 150px; padding: 8px 10px; border-radius: var(--radius);
    border: 1.5px solid var(--border); background: var(--surface);
    cursor: pointer; transition: all 0.15s;
  }
  .track-tab.active-german { border-color: var(--german); background: var(--german-bg); }
  .track-tab.active-dp100  { border-color: var(--dp100);  background: var(--dp100-bg); }
  .track-tab-icon  { font-size: 16px; margin-bottom: 2px; }
  .track-tab-label { font-size: 11px; font-weight: 700; color: var(--text); }
  .track-tab-bar   { height: 3px; background: var(--subtle); border-radius: 2px; margin-top: 6px; overflow: hidden; }
  .track-tab-fill  { height: 100%; border-radius: 2px; transition: width 0.4s; }
  .track-tab-pct   { font-size: 10px; font-weight: 700; margin-top: 4px; font-family: 'DM Mono', monospace; }

  /* ── Sections ── */
  .sections { padding: 0 12px; }
  .section { margin-bottom: 8px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px; cursor: pointer;
    background: var(--surface); user-select: none;
  }
  .section-header.done-german { background: var(--german-bg); border-bottom: 1px solid rgba(245,158,11,0.2); }
  .section-header.done-dp100  { background: var(--dp100-bg);  border-bottom: 1px solid rgba(129,140,248,0.2); }
  .section-title  { flex: 1; font-size: 13px; font-weight: 700; }
  .section-count  { font-size: 11px; font-family: 'DM Mono', monospace; }
  .section-arrow  { font-size: 10px; color: var(--muted); }

  .todo-item {
    display: flex; gap: 12px; padding: 11px 14px; cursor: pointer;
    align-items: flex-start; border-top: 1px solid var(--border);
    background: var(--surface); transition: background 0.1s; active: background: var(--subtle);
  }
  .todo-item:active { background: var(--subtle); }
  .todo-item.checked-german { background: var(--german-bg); }
  .todo-item.checked-dp100  { background: var(--dp100-bg); }

  .checkbox {
    width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; margin-top: 1px;
    border: 2px solid var(--subtle); background: transparent;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .checkbox.checked-german { background: var(--german); border-color: var(--german); }
  .checkbox.checked-dp100  { background: var(--dp100);  border-color: var(--dp100); }
  .checkbox svg { display: none; }
  .checkbox.checked-german svg, .checkbox.checked-dp100 svg { display: block; }

  .todo-text { font-size: 13px; line-height: 1.5; color: var(--text); }
  .todo-text.checked { color: var(--muted); text-decoration: line-through; }
  .todo-note { font-size: 11px; color: var(--muted); margin-top: 3px; }
  .user-desc { font-size: 12px; color: #a0a0a0; margin-top: 5px; line-height: 1.5; white-space: pre-wrap; }
  .desc-textarea {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: 6px;
    padding: 8px; font-size: 12px; font-family: 'DM Sans', sans-serif;
    resize: none; outline: none; margin-top: 6px; line-height: 1.5;
    min-height: 60px;
  }
  .desc-textarea:focus { border-color: var(--dp100); }
  .edit-btn {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 13px; padding: 2px 4px; border-radius: 4px; flex-shrink: 0;
    opacity: 0.6; transition: opacity 0.15s;
  }
  .edit-btn:active { opacity: 1; }
  .desc-save-btn {
    margin-top: 6px; padding: 5px 14px; border-radius: 6px; border: none;
    background: var(--dp100); color: #000; font-size: 11px; font-weight: 700;
    cursor: pointer; font-family: 'DM Sans', sans-serif;
  }
  .desc-cancel-btn {
    margin-top: 6px; margin-left: 6px; padding: 5px 14px; border-radius: 6px;
    border: 1px solid var(--border); background: none; color: var(--muted);
    font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  }

  /* ── Empty state ── */
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 40px; margin-bottom: 12px; }
  .empty p { font-size: 14px; line-height: 1.6; }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,15,15,0.95); backdrop-filter: blur(12px);
    border-top: 1px solid var(--border);
    padding: 10px 16px; padding-bottom: calc(10px + env(safe-area-inset-bottom));
    display: flex; gap: 10px;
  }
  .test-btn {
    flex: 1; padding: 13px; border-radius: var(--radius); border: none;
    font-weight: 700; font-size: 14px; cursor: pointer;
    font-family: 'DM Sans', sans-serif; transition: opacity 0.15s;
  }
  .test-btn:disabled { opacity: 0.5; }
  .test-btn-german { background: var(--german); color: #000; }
  .test-btn-dp100  { background: var(--dp100);  color: #000; }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    display: flex; align-items: flex-end; justify-content: center;
    z-index: 100; padding: 0;
  }
  .modal {
    background: var(--surface); border-radius: 20px 20px 0 0;
    width: 100%; max-width: 640px; max-height: 90vh;
    overflow: hidden; display: flex; flex-direction: column;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .modal-handle { width: 36px; height: 4px; background: var(--subtle); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
  .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; flex-shrink: 0; }
  .modal-title  { font-size: 16px; font-weight: 700; }
  .modal-close  { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; padding: 4px; }
  .modal-body   { padding: 0 20px 20px; overflow-y: auto; flex: 1; }

  textarea {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; font-family: 'DM Mono', monospace; font-size: 12px;
    resize: vertical; line-height: 1.6; outline: none;
  }
  textarea:focus { border-color: var(--dp100); }

  .radio-row { display: flex; gap: 16px; margin-bottom: 12px; }
  .radio-label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; color: var(--text); }
  input[type="radio"] { accent-color: var(--dp100); }
  input[type="text"] {
    width: 100%; background: var(--bg); color: var(--text);
    border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 12px; font-family: 'DM Mono', monospace; font-size: 12px;
    outline: none; margin-bottom: 8px;
  }
  input[type="text"]:focus { border-color: var(--dp100); }

  .apply-btn {
    width: 100%; padding: 13px; border-radius: var(--radius); border: none;
    background: var(--dp100); color: #000; font-weight: 700; font-size: 14px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 12px;
  }
  .file-btn {
    display: inline-block; padding: 9px 16px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: var(--surface2);
    color: var(--text); font-size: 12px; cursor: pointer; margin-bottom: 10px;
  }

  .error-msg { color: var(--red); font-size: 12px; margin-top: 8px; }

  pre.format-block {
    background: var(--bg); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px;
    font-family: 'DM Mono', monospace; font-size: 11px;
    overflow-x: auto; line-height: 1.7; color: #a3e635;
    white-space: pre-wrap; word-break: break-word;
  }
  .hint { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }

  /* Test output */
  .test-output {
    margin: 0 12px 12px; border: 1px solid var(--border);
    border-radius: var(--radius); overflow: hidden;
  }
  .test-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 14px; background: var(--surface);
    font-size: 12px; font-weight: 700;
  }
  .test-close-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; }
  .test-body {
    padding: 14px; font-size: 12.5px; line-height: 1.8;
    white-space: pre-wrap; max-height: 400px; overflow-y: auto;
    background: var(--bg); color: var(--text);
  }

  .loading-dot {
    display: inline-block; width: 6px; height: 6px; border-radius: 50%;
    background: var(--muted); animation: pulse 1s ease-in-out infinite;
  }
  .loading-dot:nth-child(2) { animation-delay: 0.2s; }
  .loading-dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }

  /* API key setting */
  .settings-row { margin-bottom: 14px; }
  .settings-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }

  /* Progress ring */
  .pill {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 3px 8px; border-radius: 20px; font-size: 10px;
    font-family: 'DM Mono', monospace; font-weight: 500;
  }
  .section-done-badge { font-size: 10px; font-family: 'DM Mono', monospace; }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
  .sync-dot.synced  { background: #34d399; }
  .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; }
  .sync-dot.offline { background: #f87171; }
  .sync-dot.nokey   { background: #555; }
  .sync-label { font-size: 10px; color: var(--muted); }

  /* Streak */
  .streak-badge { display:flex; align-items:center; gap:4px; padding:3px 8px; border-radius:20px; background:rgba(245,158,11,0.15); border:1px solid rgba(245,158,11,0.3); font-size:11px; font-weight:700; color:#f59e0b; }

  /* Pomodoro */
  .pomo-bar { display:flex; align-items:center; gap:8px; background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:8px 12px; }
  .pomo-time { font-family:'DM Mono',monospace; font-size:15px; font-weight:700; color:var(--text); min-width:42px; }
  .pomo-btn { background:none; border:none; cursor:pointer; font-size:16px; padding:2px 4px; }
  .pomo-label { font-size:10px; color:var(--muted); }
  .pomo-bar.work  { border-color:rgba(99,102,241,0.4); background:rgba(99,102,241,0.08); }
  .pomo-bar.break { border-color:rgba(52,211,153,0.4); background:rgba(52,211,153,0.08); }

  /* Compact mode */
  .compact .todo-item { padding:6px 14px; }
  .compact .todo-text { font-size:12px; }
  .compact .todo-note, .compact .user-desc { display:none; }
  .compact .section-header { padding:8px 14px; }

  /* Test selector */
  .section-check-row { display:flex; align-items:center; gap:10px; padding:10px 0; border-bottom:1px solid var(--border); cursor:pointer; }
  .section-check-row:last-child { border-bottom:none; }
  .section-check-label { flex:1; font-size:13px; }
  .section-check-count { font-size:11px; color:var(--muted); font-family:'DM Mono',monospace; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;gap:8px">
    <div class="header-title">Skill Tracker</div>
    <div style="display:flex;align-items:center;gap:5px">
      <div class="sync-dot nokey" id="syncDot"></div>
      <span class="sync-label" id="syncLabel">sync kapalı</span>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="streak-badge" id="streakBadge">🔥 0</div>
    <button class="icon-btn" onclick="toggleCompact()" id="compactBtn" title="Kompakt Mod">⊟</button>
    <button class="icon-btn" onclick="openModal('firebase')" title="Firebase Sync">☁</button>
    <button class="icon-btn" onclick="openModal('format')" title="JSON Formatı">?</button>
    <button class="icon-btn" onclick="openModal('import')" title="JSON Yükle">+</button>
    <button class="icon-btn" onclick="exportData()" title="Tümünü Dışa Aktar">↓</button>
  </div>
</div>

<div class="track-tabs" id="trackTabs"></div>
<div id="sectionsContainer" class="sections"></div>
<div id="copyToast" style="display:none;position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#34d399;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:200;">✓ Kopyalandı!</div>

<div class="bottom-bar" style="flex-direction:column;gap:8px">
  <div class="pomo-bar" id="pomoBar">
    <span class="pomo-label" id="pomoLabel">ÇALIŞMA</span>
    <span class="pomo-time" id="pomoTime">25:00</span>
    <button class="pomo-btn" onclick="togglePomo()" id="pomoBtnEl">▶</button>
    <button class="pomo-btn" onclick="resetPomo()" title="Sıfırla">↺</button>
  </div>
  <div style="display:flex;gap:8px;width:100%">
    <button class="test-btn" id="exportCheckedBtn" onclick="openTestSelector()">Test Oluştur</button>
    <button class="test-btn" id="exportCheckedJsonBtn" onclick="exportChecked()" style="flex:0;padding:13px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);">📋 Kopyala</button>
    <button class="test-btn" onclick="exportCheckedJson()" style="flex:0;padding:13px 16px;background:var(--surface);color:var(--text);border:1px solid var(--border);">↓ JSON</button>
  </div>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay" style="display:none" onclick="closeModal()">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header">
      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────
let data = {};
let checked = {};
let activeTrack = "";
let db = null;
let syncKey = "";
let saveTimer = null;
let remoteListener = null;
let ignoreRemote = false;
let userDescs = {};
let streak = 0;
let lastActiveDate = "";
let compactMode = false;
let pomoSeconds = 25 * 60;
let pomoRunning = false;
let pomoInterval = null;
let pomoIsBreak = false;

const DEFAULT_META = {
  german: { label: "Almanca B2",       icon: "🇩🇪", color: "#f59e0b", cls: "german" },
  dp100:  { label: "DP-100 + LLM/RAG", icon: "🤖",  color: "#818cf8", cls: "dp100"  },
};

// ── Sync status UI ────────────────────────────────────────────
function setSyncStatus(state) {
  const dot = document.getElementById("syncDot");
  const lbl = document.getElementById("syncLabel");
  if (!dot) return;
  dot.className = "sync-dot " + state;
  lbl.textContent = { synced:"senkronize", syncing:"kaydediliyor…", offline:"bağlantı yok", nokey:"sync kapalı" }[state] || state;
}

// ── Firebase init ─────────────────────────────────────────────
function initFirebase(config, key) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(config);
    else firebase.app();
    db = firebase.database();
    syncKey = key;
    try { localStorage.setItem("skt_fb_config", JSON.stringify(config)); } catch {}
    try { localStorage.setItem("skt_fb_key", key); } catch {}
    startRemoteListener();
    setSyncStatus("syncing");
  } catch(e) {
    alert("Firebase bağlantı hatası: " + e.message);
  }
}

function startRemoteListener() {
  if (remoteListener) remoteListener();
  if (!db || !syncKey) return;
  const ref = db.ref(syncKey);
  ref.on("value", snap => {
    if (ignoreRemote) return;
    const val = snap.val();
    if (!val) { pushToFirebase(); return; }
    if (val.data)    { data    = val.data;    try { localStorage.setItem("skt_data",    JSON.stringify(data));    } catch {} }
    if (val.checked)   { checked   = val.checked;   try { localStorage.setItem("skt_checked", JSON.stringify(checked));   } catch {} }
    if (val.userDescs) { userDescs = val.userDescs; try { localStorage.setItem("skt_descs",   JSON.stringify(userDescs)); } catch {} }
    if (!activeTrack || !data[activeTrack]) activeTrack = Object.keys(data)[0] || "german";
    render();
    setSyncStatus("synced");
  }, err => { setSyncStatus("offline"); });
}

function pushToFirebase() {
  if (!db || !syncKey) return;
  ignoreRemote = true;
  setSyncStatus("syncing");
  db.ref(syncKey).set({ data, checked, userDescs })
    .then(() => { setSyncStatus("synced"); })
    .catch(() => { setSyncStatus("offline"); })
    .finally(() => { setTimeout(() => { ignoreRemote = false; }, 300); });
}

// ── Save / Load ───────────────────────────────────────────────
function save() {
  try { localStorage.setItem("skt_data",    JSON.stringify(data));    } catch {}
  try { localStorage.setItem("skt_checked", JSON.stringify(checked)); } catch {}
  try { localStorage.setItem("skt_descs",   JSON.stringify(userDescs)); } catch {}
  try { localStorage.setItem("skt_streak", String(streak)); } catch {}
  try { localStorage.setItem("skt_last_date", lastActiveDate); } catch {}
  if (db && syncKey) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(pushToFirebase, 600);
  }
}

function load() {
  try { const d = localStorage.getItem("skt_data");    if (d) data    = JSON.parse(d); } catch {}
  try { const c = localStorage.getItem("skt_checked"); if (c) checked = JSON.parse(c); } catch {}
  try { const u = localStorage.getItem("skt_descs");   if (u) userDescs = JSON.parse(u); } catch {}
  try { streak = parseInt(localStorage.getItem("skt_streak") || "0"); } catch {}
  try { lastActiveDate = localStorage.getItem("skt_last_date") || ""; } catch {}
  try { compactMode = localStorage.getItem("skt_compact") === "true"; } catch {}
  if (!Object.keys(data).length) data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  activeTrack = Object.keys(data)[0] || "german";
  // Auto-reconnect if config was saved
  try {
    const cfg = localStorage.getItem("skt_fb_config");
    const key = localStorage.getItem("skt_fb_key");
    if (cfg && key) initFirebase(JSON.parse(cfg), key);
  } catch {}
}

// ── Computed ─────────────────────────────────────────────────
function allItems(tid)  { return (data[tid]?.sections || []).flatMap(s => s.items); }
function doneCount(tid) { return allItems(tid).filter(i => checked[i.id]).length; }
function pct(tid)       { const t = allItems(tid).length; return t ? Math.round(doneCount(tid)/t*100) : 0; }
function trackCls(tid)  { return data[tid]?.meta?.cls || (DEFAULT_META[tid]?.cls) || "dp100"; }
function trackColor(tid){ return data[tid]?.meta?.color || DEFAULT_META[tid]?.color || "#818cf8"; }

// ── Render ───────────────────────────────────────────────────
function render() {
  renderTabs();
  renderSections();
  updateTestBtn();
  save();
}

function renderTabs() {
  const el = document.getElementById("trackTabs");
  el.innerHTML = Object.entries(data).map(([tid, t]) => {
    const m   = t.meta || DEFAULT_META[tid] || {};
    const cls = m.cls || "dp100";
    const active = tid === activeTrack ? `active-${cls}` : "";
    const p = pct(tid);
    return `<div class="track-tab ${active}" onclick="selectTrack('${tid}')">
      <div class="track-tab-icon">${m.icon || "📋"}</div>
      <div class="track-tab-label">${m.label || tid}</div>
      <div class="track-tab-bar"><div class="track-tab-fill" style="width:${p}%;background:${m.color || '#818cf8'}"></div></div>
      <div class="track-tab-pct" style="color:${m.color || '#818cf8'}">${doneCount(tid)}/${allItems(tid).length} · ${p}%</div>
    </div>`;
  }).join("");
}

let collapsed = {};
function renderSections() {
  const container = document.getElementById("sectionsContainer");
  const t = data[activeTrack];
  const cls = trackCls(activeTrack);
  const color = trackColor(activeTrack);

  if (!t?.sections?.length) {
    container.innerHTML = `<div class="empty">
      <div class="empty-icon">📭</div>
      <p>Bu track'te henüz madde yok.<br>Sağ üstten + JSON Yükle ile ekle.</p>
    </div>`;
    return;
  }

  container.innerHTML = t.sections.map((sec, si) => {
    const sk = `${activeTrack}-${si}`;
    const isCol = collapsed[sk];
    const secDone = sec.items.filter(i => checked[i.id]).length;
    const allDone = secDone === sec.items.length && sec.items.length > 0;
    const headerCls = allDone ? `done-${cls}` : "";
    const arrow = isCol ? "▼" : "▲";

    const items = isCol ? "" : sec.items.map((item, ii) => {
      const isChecked = !!checked[item.id];
      const chkCls = isChecked ? `checked-${cls}` : "";
      const desc = userDescs[item.id] || "";
      const isEditing = editingId === item.id;
      return `<div class="todo-item ${chkCls}" id="item-${item.id}">
        <div class="checkbox ${chkCls}" onclick="toggleItem('${item.id}')">
          <svg width="10" height="8" viewBox="0 0 10 8" fill="none">
            <path d="M1 4L3.5 6.5L9 1" stroke="#000" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div style="flex:1" onclick="toggleItem('${item.id}')">
          <div class="todo-text ${isChecked ? 'checked' : ''}">${item.text}</div>
          ${item.note ? `<div class="todo-note">💡 ${item.note}</div>` : ""}
          ${!isEditing && desc ? `<div class="user-desc">📝 ${desc}</div>` : ""}
          ${isEditing ? `
            <textarea class="desc-textarea" id="desc-${item.id}" onclick="event.stopPropagation()">${desc}</textarea>
            <div onclick="event.stopPropagation()">
              <button class="desc-save-btn" onclick="saveDesc('${item.id}')">Kaydet</button>
              <button class="desc-cancel-btn" onclick="cancelEdit()">İptal</button>
            </div>` : ""}
          ${!isEditing && !desc ? `<div style="margin-top:4px;font-size:11px;color:var(--muted);opacity:0.5">📝 not ekle</div>` : ""}
        </div>
        <button class="edit-btn" onclick="event.stopPropagation();startEdit('${item.id}')" title="Not ekle/düzenle">✏️</button>
      </div>`;
    }).join("");

    return `<div class="section">
      <div class="section-header ${headerCls}" onclick="toggleSection('${sk}')">
        <span class="section-title">${sec.title}</span>
        <span class="section-done-badge" style="color:${color}">${secDone}/${sec.items.length}</span>
        <span class="section-arrow">${arrow}</span>
      </div>
      ${items}
    </div>`;
  }).join("");
}

// ── Description editing ───────────────────────────────────────
let editingId = null;

function startEdit(id) {
  editingId = id;
  renderSections();
  setTimeout(() => {
    const ta = document.getElementById("desc-" + id);
    if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); }
  }, 50);
}

function saveDesc(id) {
  const ta = document.getElementById("desc-" + id);
  if (!ta) return;
  const val = ta.value.trim();
  if (val) userDescs[id] = val;
  else delete userDescs[id];
  editingId = null;
  save();
  renderSections();
}

function cancelEdit() {
  editingId = null;
  renderSections();
}

function updateTestBtn() {
  const btn = document.getElementById("exportCheckedBtn");
  const t = data[activeTrack];
  const cnt = (t?.sections || []).flatMap(s => s.items).filter(i => checked[i.id]).length;
  const m = t?.meta || DEFAULT_META[activeTrack] || {};
  const cls = m.cls || "dp100";
  btn.className = `test-btn test-btn-${cls}`;
  btn.textContent = `${m.icon || "🧪"} Test Oluştur (${cnt})`;

}

// ── Export Checked ────────────────────────────────────────────
function exportChecked() {
  const t = data[activeTrack];
  const m = t?.meta || DEFAULT_META[activeTrack] || {};
  const done = (t?.sections || []).flatMap(s =>
    s.items.filter(i => checked[i.id]).map(i => i.text)
  );
  if (!done.length) { alert("Bu track'te tiklenmiş madde yok."); return; }
  const lines = [`=== ${m.label} (${done.length} madde) ===`, ...done.map(t => `- ${t}`)];
  const text = lines.join("\n");
  navigator.clipboard.writeText(text).then(() => showToast()).catch(() => prompt("Kopyala:", text));
}

function exportCheckedJson() {
  const result = [];
  for (const [tid, t] of Object.entries(data)) {
    const m = t.meta || DEFAULT_META[tid] || {};
    const done = (t.sections || []).flatMap(s =>
      s.items.filter(i => checked[i.id]).map(i => ({ id: i.id, text: i.text }))
    );
    if (done.length) result.push({ track: tid, trackLabel: m.label, completed: done });
  }
  if (!result.length) { alert("Henüz tiklenmiş madde yok."); return; }
  const blob = new Blob([JSON.stringify(result, null, 2)], {type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob); a.download = "tamamlananlar.json"; a.click();
}

function showToast() {
  showToastMsg("✓ Kopyalandı!");
}

function selectTrack(tid) { activeTrack = tid; render(); }

function toggleItem(id) {
  checked[id] = !checked[id];
  if (checked[id]) updateStreak();
  render();
}

function toggleSection(sk) {
  collapsed[sk] = !collapsed[sk];
  renderSections();
}

// ── JSON Import ───────────────────────────────────────────────
function applyJson(json, mode) {
  let parsed;
  try { parsed = JSON.parse(json); } catch { return "Geçersiz JSON."; }
  const blocks = Array.isArray(parsed) ? parsed : [parsed];
  let newData = mode === "replace" ? {} : JSON.parse(JSON.stringify(data));

  for (const block of blocks) {
    const tid = block.track;
    if (!tid) return "'track' alanı zorunlu.";
    if (!newData[tid]) {
      newData[tid] = {
        meta: {
          label: block.trackLabel || tid,
          icon:  block.icon  || "📋",
          color: block.color || "#818cf8",
          cls:   block.cls   || "dp100"
        },
        sections: []
      };
    }
    if (block.section && block.items) {
      const existing = newData[tid].sections.find(s => s.title === block.section);
      if (existing && mode === "merge") {
        const ids = new Set(existing.items.map(i => i.id));
        block.items.forEach(item => { if (!ids.has(item.id)) existing.items.push(item); });
      } else {
        newData[tid].sections.push({ title: block.section, items: block.items });
      }
    }
  }
  data = newData;
  activeTrack = Object.keys(data)[0];
  render();
  return null;
}

// ── Streak ───────────────────────────────────────────────────
function updateStreak() {
  const today = new Date().toISOString().slice(0, 10);
  if (lastActiveDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);
  streak = (lastActiveDate === yesterday) ? streak + 1 : 1;
  lastActiveDate = today;
  try { localStorage.setItem("skt_streak", String(streak)); } catch {}
  try { localStorage.setItem("skt_last_date", today); } catch {}
  updateStreakUI();
}

function updateStreakUI() {
  const el = document.getElementById("streakBadge");
  if (el) el.textContent = `🔥 ${streak || 0}`;
}

// ── Compact mode ──────────────────────────────────────────────
function toggleCompact() {
  compactMode = !compactMode;
  try { localStorage.setItem("skt_compact", String(compactMode)); } catch {}
  document.getElementById("sectionsContainer").classList.toggle("compact", compactMode);
  document.getElementById("compactBtn").style.opacity = compactMode ? "1" : "0.6";
}

// ── Pomodoro ──────────────────────────────────────────────────
function updatePomoUI() {
  const m = Math.floor(pomoSeconds / 60).toString().padStart(2, "0");
  const s = (pomoSeconds % 60).toString().padStart(2, "0");
  document.getElementById("pomoTime").textContent = `${m}:${s}`;
  document.getElementById("pomoBtnEl").textContent = pomoRunning ? "⏸" : "▶";
  document.getElementById("pomoLabel").textContent = pomoIsBreak ? "MOLA" : "ÇALIŞMA";
  const bar = document.getElementById("pomoBar");
  bar.className = "pomo-bar " + (pomoIsBreak ? "break" : "work");
}

function togglePomo() {
  if (pomoRunning) {
    clearInterval(pomoInterval); pomoRunning = false;
  } else {
    pomoRunning = true;
    pomoInterval = setInterval(() => {
      pomoSeconds--;
      if (pomoSeconds <= 0) {
        clearInterval(pomoInterval); pomoRunning = false;
        pomoIsBreak = !pomoIsBreak;
        pomoSeconds = pomoIsBreak ? 5 * 60 : 25 * 60;
        try { new Audio("data:audio/wav;base64,UklGRnoGAABXQVZFZm10IBAAAA...").play(); } catch {}
        showToastMsg(pomoIsBreak ? "☕ Mola zamanı! 5 dakika." : "💪 Çalışma zamanı! 25 dakika.");
      }
      updatePomoUI();
    }, 1000);
  }
  updatePomoUI();
}

function resetPomo() {
  clearInterval(pomoInterval); pomoRunning = false;
  pomoIsBreak = false; pomoSeconds = 25 * 60;
  updatePomoUI();
}

function showToastMsg(msg) {
  const t = document.getElementById("copyToast");
  t.textContent = msg; t.style.display = "block";
  setTimeout(() => { t.style.display = "none"; t.textContent = "✓ Kopyalandı!"; }, 3000);
}

function selectAllSections(val) {

async function runTestFromSelector() {
  const t = data[activeTrack];
  const m = t?.meta || DEFAULT_META[activeTrack] || {};
  const selected = [...document.querySelectorAll("#sectionCheckList input[type=checkbox]")]
    .map((cb, si) => cb.checked ? t.sections[si] : null).filter(Boolean);

  const done = selected.flatMap(sec => sec.items.filter(i => checked[i.id]).map(i => i.text));
  if (!done.length) { alert("Seçili bölümlerde tiklenmiş madde yok."); return; }

  closeModal();

  const testOut = document.getElementById("testOutput") || (() => {
    const d = document.createElement("div"); d.id = "testOutput"; d.className = "test-output";
    document.getElementById("sectionsContainer").after(d); return d;
  })();
  const titleEl = document.getElementById("testTitle") || (() => { const s=document.createElement("span"); s.id="testTitle"; return s; })();
  const bodyEl  = document.getElementById("testBody")  || (() => { const s=document.createElement("div");  s.id="testBody";  return s; })();

  if (!testOut.querySelector("#testTitle")) {
    const hdr = document.createElement("div"); hdr.className = "test-header";
    const cls = document.createElement("button"); cls.className = "test-close-btn"; cls.textContent = "✕";
    cls.onclick = () => testOut.style.display = "none";
    hdr.append(titleEl, cls); testOut.append(hdr, bodyEl);
  }

  testOut.style.display = "block";
  titleEl.textContent = `${m.icon} Test — ${done.length} madde, ${selected.length} bölüm`;
  bodyEl.innerHTML = `<span class="loading-dot"></span><span class="loading-dot"></span><span class="loading-dot"></span>`;
  testOut.scrollIntoView({behavior:"smooth"});

  const isGerman = activeTrack === "german";
  const list = done.join("\n");
  const prompt = isGerman
    ? `Almanca öğrencisi şu konuları tamamladı:\n${list}\n\n8 soruluk test oluştur. 3 çoktan seçmeli (4 şık, doğrusu işaretli), 3 boşluk doldurma, 2 cümle yazma görevi. Türkçe açıklamalı, Almanca pratikli. Her sorudan sonra kısa kural hatırlatması ekle.`
    : `Student completed:\n${list}\n\nGenerate 8 technical questions: 3 multiple choice (mark correct), 3 short answer, 2 code/practical tasks. Brief explanation after each answer.`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:1000, messages:[{role:"user",content:prompt}] })
    });
    const d = await res.json();
    bodyEl.textContent = d.content?.map(b=>b.text||"").join("") || "Yanıt alınamadı.";
  } catch(e) { bodyEl.textContent = "Bağlantı hatası: " + e.message; }
}

function submitFirebase() {
  const cfgRaw = document.getElementById("fbConfig").value.trim();
  const key    = document.getElementById("fbKey").value.trim();
  if (!key) { document.getElementById("fbError").textContent = "⚠ Sync key boş olamaz."; return; }
  let cfg;
  try {
    // Accept both JS object syntax and JSON (auto-add quotes to unquoted keys)
    const normalized = cfgRaw.replace(/([{,]\s*)([a-zA-Z_][a-zA-Z0-9_]*)\s*:/g, '$1"$2":');
    cfg = JSON.parse(normalized);
  } catch { document.getElementById("fbError").textContent = "⚠ Geçersiz format — Firebase config'i olduğu gibi yapıştır."; return; }
  if (!cfg.databaseURL) { document.getElementById("fbError").textContent = "⚠ databaseURL eksik — Realtime Database aktif mi?"; return; }
  initFirebase(cfg, key);
  closeModal();
}

function disconnectFirebase() {
  if (remoteListener) { db.ref(syncKey).off(); }
  db = null; syncKey = "";
  try { localStorage.removeItem("skt_fb_config"); localStorage.removeItem("skt_fb_key"); } catch {}
  setSyncStatus("nokey");
  closeModal();
}

function closeModal() {
  document.getElementById("modalOverlay").style.display = "none";
}

function readFile(input) {
  const file = input.files[0]; if (!file) return;
  const r = new FileReader();
  r.onload = e => { document.getElementById("jsonInput").value = e.target.result; };
  r.readAsText(file);
}

function submitJson() {
  const json = document.getElementById("jsonInput").value.trim();
  const err = applyJson(json, currentMode);
  if (err) { document.getElementById("jsonError").textContent = "⚠ " + err; return; }
  closeModal();
}
