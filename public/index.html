<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skill Tracker">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="/manifest.json">
<title>Skill Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0f0f0f;--surface:#1a1a1a;--surface2:#222;--border:#2a2a2a;--text:#f0f0f0;--muted:#666;--subtle:#333;--radius:12px;--radius-sm:8px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;padding-bottom:80px;overscroll-behavior:none}
.header{position:sticky;top:0;z-index:50;background:rgba(15,15,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.header-left{display:flex;align-items:center;gap:8px;min-width:0}
.header-title{font-size:16px;font-weight:700;letter-spacing:-0.3px;white-space:nowrap}
.sync-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.sync-dot.synced{background:#34d399}.sync-dot.syncing{background:#f59e0b;animation:pulse 1s infinite}.sync-dot.offline{background:#f87171}.sync-dot.nokey{background:#444}
.streak-badge{display:flex;align-items:center;gap:3px;padding:2px 8px;border-radius:20px;background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);font-size:11px;font-weight:700;color:#f59e0b;white-space:nowrap}
.header-btns{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:34px;height:34px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pomo-sticky{position:sticky;top:57px;z-index:49;background:rgba(15,15,15,0.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:8px 16px;display:flex;align-items:center;gap:10px}
.pomo-label{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.pomo-time{font-family:'DM Mono',monospace;font-size:17px;font-weight:700;min-width:48px}
.pomo-time.work{color:#818cf8}.pomo-time.break{color:#34d399}
.pomo-btn{background:none;border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:13px;padding:4px 10px;cursor:pointer}
.pomo-progress{flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.pomo-fill{height:100%;border-radius:2px;transition:none}
.pomo-fill.work{background:#818cf8}.pomo-fill.break{background:#34d399}
.track-tabs{display:flex;gap:6px;padding:10px 12px;flex-wrap:wrap}
.track-tab{flex:1 1 110px;max-width:150px;padding:8px 10px;border-radius:var(--radius);border:1.5px solid var(--border);background:var(--surface);cursor:pointer;transition:border-color 0.15s,background 0.15s}
.track-tab-icon{font-size:16px;margin-bottom:2px}
.track-tab-label{font-size:11px;font-weight:700}
.track-tab-bar{height:3px;background:var(--subtle);border-radius:2px;margin-top:6px;overflow:hidden}
.track-tab-fill{height:100%;border-radius:2px;transition:width 0.4s}
.track-tab-pct{font-size:10px;font-weight:700;margin-top:3px;font-family:'DM Mono',monospace}
.sections{padding:0 12px}
.section{margin-bottom:8px;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border)}
.section-header{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:var(--surface);user-select:none}
.section-title{flex:1;font-size:13px;font-weight:700}
.section-badge{font-size:10px;font-family:'DM Mono',monospace}
.section-arrow{font-size:10px;color:var(--muted)}
.todo-item{display:flex;gap:10px;padding:10px 14px;cursor:pointer;align-items:flex-start;border-top:1px solid var(--border);background:var(--surface);transition:background 0.1s;position:relative}
.todo-item:active{background:var(--subtle)}
.checkbox{width:18px;height:18px;border-radius:5px;flex-shrink:0;margin-top:1px;border:2px solid var(--subtle);background:transparent;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.todo-text{font-size:13px;line-height:1.5;flex:1}
.todo-text.done{color:var(--muted);text-decoration:line-through}
.todo-note{font-size:11px;color:var(--muted);margin-top:3px}
.user-desc{font-size:12px;color:#888;margin-top:4px;line-height:1.5;white-space:pre-wrap}
.edit-btn{background:none;border:none;color:var(--muted);cursor:pointer;font-size:13px;padding:2px 4px;flex-shrink:0;opacity:0;transition:opacity 0.15s;margin-top:1px}
.todo-item:hover .edit-btn{opacity:0.6}
@media(hover:none){.edit-btn{opacity:0.35}}
.desc-textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:6px;padding:8px;font-size:12px;font-family:'DM Sans',sans-serif;resize:none;outline:none;margin-top:6px;line-height:1.5;min-height:60px}
.desc-textarea:focus{border-color:#818cf8}
.desc-actions{display:flex;gap:6px;margin-top:6px}
.desc-save{padding:5px 14px;border-radius:6px;border:none;background:#818cf8;color:#000;font-size:11px;font-weight:700;cursor:pointer;font-family:'DM Sans',sans-serif}
.desc-cancel{padding:5px 14px;border-radius:6px;border:1px solid var(--border);background:none;color:var(--muted);font-size:11px;cursor:pointer;font-family:'DM Sans',sans-serif}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty-icon{font-size:36px;margin-bottom:10px}
.bottom-bar{position:fixed;bottom:0;left:0;right:0;background:rgba(15,15,15,0.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px}
.btn{flex:1;padding:12px 8px;border-radius:var(--radius);border:none;font-weight:700;font-size:13px;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}
.btn-ghost{background:var(--surface);color:var(--text);border:1px solid var(--border);flex:0;padding:12px 14px}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:#34d399;color:#000;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:700;z-index:300;display:none}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:flex;align-items:flex-end;justify-content:center;z-index:100}
.modal{background:var(--surface);border-radius:20px 20px 0 0;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;padding-bottom:env(safe-area-inset-bottom)}
.modal-handle{width:36px;height:4px;background:var(--subtle);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px;flex-shrink:0;border-bottom:1px solid var(--border)}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer}
.modal-body{padding:16px 20px 20px;overflow-y:auto;flex:1}
textarea{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-family:'DM Mono',monospace;font-size:12px;resize:vertical;line-height:1.6;outline:none}
textarea:focus{border-color:#818cf8}
input[type="text"],input[type="password"]{width:100%;background:var(--bg);color:var(--text);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;font-family:'DM Mono',monospace;font-size:12px;outline:none}
input:focus{border-color:#818cf8}
.apply-btn{width:100%;padding:13px;border-radius:var(--radius);border:none;background:#818cf8;color:#000;font-weight:700;font-size:14px;cursor:pointer;font-family:'DM Sans',sans-serif;margin-top:12px}
.radio-row{display:flex;gap:16px;margin-bottom:12px}
.radio-label{display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer}
input[type="radio"]{accent-color:#818cf8}
.hint{font-size:12px;color:var(--muted);line-height:1.6;margin-bottom:12px}
.settings-label{font-size:12px;font-weight:600;color:var(--muted);margin-bottom:6px;display:block;margin-top:10px}
.file-btn{display:inline-block;padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:12px;cursor:pointer;margin-bottom:10px}
.error-msg{color:#f87171;font-size:12px;margin-top:8px;min-height:16px}
pre.format-block{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;font-family:'DM Mono',monospace;font-size:11px;overflow-x:auto;line-height:1.7;color:#a3e635;white-space:pre-wrap;word-break:break-word}
.sec-check-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border);cursor:pointer}
.sec-check-row:last-child{border-bottom:none}
.sec-check-label{flex:1;font-size:13px}
.sec-check-count{font-size:11px;color:var(--muted);font-family:'DM Mono',monospace}
.coach-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:200;display:flex;flex-direction:column;justify-content:flex-end}
.coach-panel{background:var(--surface);border-radius:20px 20px 0 0;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.coach-handle{width:36px;height:4px;background:var(--subtle);border-radius:2px;margin:12px auto 0}
.coach-header{padding:14px 20px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.coach-title{font-size:16px;font-weight:700}
.coach-body{padding:16px 20px 24px}
.coach-section{margin-bottom:20px}
.coach-section-title{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px}
.test-output{margin:0 12px 12px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
.test-header{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:var(--surface);font-size:12px;font-weight:700}
.test-body{padding:14px;font-size:12.5px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;background:var(--bg)}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:var(--muted);animation:pulse 1s ease-in-out infinite}
.dot:nth-child(2){animation-delay:0.2s}.dot:nth-child(3){animation-delay:0.4s}
@keyframes pulse{0%,100%{opacity:0.3}50%{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:28px;height:28px;border:3px solid var(--border);border-top-color:#ec4899;border-radius:50%;animation:spin 0.8s linear infinite}
</style>
</head>
<body>

<script>
(function(){
  var t = localStorage.getItem('skill_token');
  if (!t) { window.location.replace('/login.html'); return; }
  window._authToken = t;

</script>

<div class="header">
  <div class="header-left">
    <span class="header-title">Skill Tracker</span>
    <div class="sync-dot nokey" id="syncDot"></div>
    <span style="font-size:10px;color:var(--muted)" id="syncLabel"></span>
    <div class="streak-badge" id="streakBadge">🔥 0</div>
  </div>
  <div class="header-btns">
    <button class="icon-btn" onclick="toggleAllSections()" id="collapseBtn" title="Tümünü Kapat/Aç">⊟</button>
    <button class="icon-btn" onclick="openModal('firebase')" title="Firebase Sync">☁</button>
    <button class="icon-btn" onclick="openModal('import')" title="JSON Yükle">+</button>
    <button class="icon-btn" onclick="openModal('format')" title="Format">?</button>

    <button class="icon-btn" onclick="logout()" title="Çıkış">🚪</button>
  </div>
</div>

<div class="pomo-sticky">
  <span class="pomo-label" id="pomoLabel">ÇALIŞMA</span>
  <span class="pomo-time work" id="pomoTime">25:00</span>
  <button class="pomo-btn" onclick="togglePomo()" id="pomoBtnEl">▶</button>
  <button class="pomo-btn" onclick="resetPomo()">↺</button>
  <div class="pomo-progress"><div class="pomo-fill work" id="pomoFill" style="width:100%"></div></div>
</div>

<div class="track-tabs" id="trackTabs"></div>
<div id="sectionsContainer" class="sections"></div>

<div class="bottom-bar">
  <button class="btn" onclick="openCoach()" style="background:#ec4899;color:#fff;font-size:14px">🎯 Koç</button>

</div>

    <div class="coach-handle"></div>
    <div class="coach-header">
      <span class="coach-title">🎯 Kişisel Koç</span>
      <button onclick="closeCoach()" style="background:none;border:none;color:var(--muted);font-size:20px;cursor:pointer">✕</button>
    </div>
    <div class="coach-body" id="coachBody"></div>

</div>

    <div class="modal-handle"></div>

      <span class="modal-title" id="modalTitle"></span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
var data = {}, checked = {}, userDescs = {};
var activeTrack = "";
var db = null, syncKey = "";
var saveTimer = null, ignoreRemote = false;
var streak = 0, lastActiveDate = "";
var allCollapsed = false, editingId = null;
var pomoSeconds = 1500, pomoTotal = 1500;
var pomoRunning = false, pomoInterval = null, pomoIsBreak = false;
var currentMode = "merge";

// ═══════════════════════════════════════════════════════════════
// SYNC STATUS
// ═══════════════════════════════════════════════════════════════
function setSyncStatus(s) {
  var dot = document.getElementById("syncDot");
  var lbl = document.getElementById("syncLabel");
  if (dot) dot.className = "sync-dot " + s;
  if (lbl) {
    lbl.textContent = {synced:"✓", syncing:"...", offline:"✗", nokey:""}[s] || "";
    lbl.style.color = {synced:"#34d399", syncing:"#f59e0b", offline:"#f87171", nokey:"var(--muted)"}[s] || "var(--muted)";
  }
}

// ═══════════════════════════════════════════════════════════════
// FIREBASE
// ═══════════════════════════════════════════════════════════════
function connectFirebase(config, key) {
  // Delete existing apps first
  var apps = firebase.apps;
  var deletePromises = apps.map(function(app) { return app.delete(); });
  Promise.all(deletePromises).then(function() {
    firebase.initializeApp(config);
    db = firebase.database();
    syncKey = key;
    try { localStorage.setItem("skt_fb_config", JSON.stringify(config)); } catch(e) {}
    try { localStorage.setItem("skt_fb_key", key); } catch(e) {}
    startFirebaseListener();
    setSyncStatus("syncing");
  }).catch(function(e) {
    // If delete fails, try directly
    try {
      if (!firebase.apps.length) firebase.initializeApp(config);
      db = firebase.database();
      syncKey = key;
      try { localStorage.setItem("skt_fb_config", JSON.stringify(config)); } catch(e2) {}
      try { localStorage.setItem("skt_fb_key", key); } catch(e2) {}
      startFirebaseListener();
      setSyncStatus("syncing");
    } catch(e2) {
      setSyncStatus("offline");
      console.error("Firebase:", e2);
    }
  });
}

function startFirebaseListener() {
  if (!db || !syncKey) return;
  db.ref(syncKey).on("value", function(snap) {
    if (ignoreRemote) return;
    var val = snap.val();
    if (!val) { pushToFirebase(); return; }
    if (val.data)      { data      = val.data;      saveLocal("skt_data",    data); }
    if (val.checked)   { checked   = val.checked;   saveLocal("skt_checked", checked); }
    if (val.userDescs) { userDescs = val.userDescs; saveLocal("skt_descs",   userDescs); }
    if (!activeTrack || !data[activeTrack]) activeTrack = Object.keys(data)[0] || "";
    render();
    setSyncStatus("synced");
  }, function() { setSyncStatus("offline"); });
}

function pushToFirebase() {
  if (!db || !syncKey) return;
  ignoreRemote = true;
  setSyncStatus("syncing");
  db.ref(syncKey).set({ data: data, checked: checked, userDescs: userDescs })
    .then(function() { setSyncStatus("synced"); })
    .catch(function() { setSyncStatus("offline"); })
    .finally(function() { setTimeout(function() { ignoreRemote = false; }, 300); });
}

// ═══════════════════════════════════════════════════════════════
// PERSISTENCE
// ═══════════════════════════════════════════════════════════════
function saveLocal(key, val) {
  try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) {}
}

function save() {
  saveLocal("skt_data", data);
  saveLocal("skt_checked", checked);
  saveLocal("skt_descs", userDescs);
  try { localStorage.setItem("skt_streak", String(streak)); } catch(e) {}
  try { localStorage.setItem("skt_last_date", lastActiveDate); } catch(e) {}
  if (db && syncKey) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(pushToFirebase, 800);
  }
}

function load() {
  try { var d = localStorage.getItem("skt_data");    if (d) data      = JSON.parse(d); } catch(e) {}
  try { var c = localStorage.getItem("skt_checked"); if (c) checked   = JSON.parse(c); } catch(e) {}
  try { var u = localStorage.getItem("skt_descs");   if (u) userDescs = JSON.parse(u); } catch(e) {}
  try { streak = parseInt(localStorage.getItem("skt_streak") || "0") || 0; } catch(e) {}
  try { lastActiveDate = localStorage.getItem("skt_last_date") || ""; } catch(e) {}
  if (!Object.keys(data).length) data = {};
  activeTrack = Object.keys(data)[0] || "";
  // Auto-reconnect Firebase
  try {
    var cfg = localStorage.getItem("skt_fb_config");
    var key = localStorage.getItem("skt_fb_key");
    if (cfg && key) connectFirebase(JSON.parse(cfg), key);
  } catch(e) {}
}

// ═══════════════════════════════════════════════════════════════
// HELPERS
// ═══════════════════════════════════════════════════════════════
function allItems(tid)   { return ((data[tid] || {}).sections || []).reduce(function(a,s){ return a.concat(s.items); }, []); }
function doneCount(tid)  { return allItems(tid).filter(function(i){ return checked[i.id]; }).length; }
function pct(tid)        { var t = allItems(tid).length; return t ? Math.round(doneCount(tid)/t*100) : 0; }
function trackColor(tid) { return ((data[tid] || {}).meta || {}).color || "#818cf8"; }
function trackCls(tid)   { return ((data[tid] || {}).meta || {}).cls   || "dp100"; }

// ═══════════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════════
function render() { renderTabs(); renderSections(); updateStreak(); save(); }

function renderTabs() {
  var el = document.getElementById("trackTabs");
  if (!el) return;
  el.innerHTML = Object.keys(data).map(function(tid) {
    var t = data[tid], m = t.meta || {}, p = pct(tid);
    var active = tid === activeTrack ? "border-color:"+m.color+";background:"+m.color+"15" : "";
    return '<div class="track-tab" style="'+active+'" onclick="selectTrack(\''+tid+'\')">'+
      '<div class="track-tab-icon">'+(m.icon||"📋")+'</div>'+
      '<div class="track-tab-label">'+(m.label||tid)+'</div>'+
      '<div class="track-tab-bar"><div class="track-tab-fill" style="width:'+p+'%;background:'+(m.color||"#818cf8")+'"></div></div>'+
      '<div class="track-tab-pct" style="color:'+(m.color||"#818cf8")+'">'+doneCount(tid)+'/'+allItems(tid).length+' · '+p+'%</div>'+
      '</div>';
  }).join("");
}

var collapsed = {};
function renderSections() {
  var container = document.getElementById("sectionsContainer");
  if (!container) return;
  var t = data[activeTrack];
  if (!t || !t.sections || !t.sections.length) {
    container.innerHTML = '<div class="empty"><div class="empty-icon">📭</div><p>Bu track boş.<br>+ ile JSON yükle.</p></div>';
    return;
  }
  var color = trackColor(activeTrack);
  container.innerHTML = t.sections.map(function(sec, si) {
    var sk = activeTrack+"-"+si;
    var isCol = allCollapsed || collapsed[sk];
    var secDone = sec.items.filter(function(i){ return checked[i.id]; }).length;
    var allDone = secDone === sec.items.length && sec.items.length > 0;
    var hdrStyle = allDone ? "background:"+color+"15;border-bottom:1px solid "+color+"30" : "";
    var itemsHtml = isCol ? "" : sec.items.map(function(item) {
      var ck = !!checked[item.id];
      var desc = userDescs[item.id] || "";
      var isEd = editingId === item.id;
      var chkStyle = ck ? "background:"+color+";border-color:"+color : "";
      return '<div class="todo-item" id="item-'+item.id+'" style="'+(ck?"background:"+color+"10":"")+'">' +
        '<div class="checkbox" style="'+chkStyle+'" onclick="toggleItem(\''+item.id+'\')">' +
          (ck ? '<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4L3.5 6.5L9 1" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>' : '') +
        '</div>' +

          (item.note && !isEd ? '<div class="todo-note">💡 '+item.note+'</div>' : '') +

          (isEd ?
            '<textarea class="desc-textarea" id="desc-'+item.id+'" onclick="event.stopPropagation()">'+desc+'</textarea>' +

        '<button class="edit-btn" onclick="event.stopPropagation();startEdit(\''+item.id+'\')">✏️</button>' +
        '</div>';
    }).join("");
    return '<div class="section">'+
      '<div class="section-header" style="'+hdrStyle+'" onclick="toggleSection(\''+sk+'\')">'+
        '<span class="section-title">'+sec.title+'</span>'+

        '<span class="section-arrow">'+(isCol?"▼":"▲")+'</span>'+

      '</div>';
  }).join("");
}

function updateStreak() {
  var today = new Date().toISOString().slice(0,10);
  if (lastActiveDate !== today && Object.keys(checked).some(function(k){ return checked[k]; })) {
    var yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    streak = (lastActiveDate === yesterday) ? streak+1 : 1;
    lastActiveDate = today;
  }
  var el = document.getElementById("streakBadge");
  if (el) el.textContent = "🔥 " + streak;
}

function updatePomoUI() {
  var mm = Math.floor(pomoSeconds/60).toString().padStart(2,"0");
  var ss = (pomoSeconds%60).toString().padStart(2,"0");
  var timeEl = document.getElementById("pomoTime");
  var btnEl  = document.getElementById("pomoBtnEl");
  var lblEl  = document.getElementById("pomoLabel");
  var fill   = document.getElementById("pomoFill");
  if (timeEl) { timeEl.textContent = mm+":"+ss; timeEl.className = "pomo-time "+(pomoIsBreak?"break":"work"); }
  if (btnEl)  btnEl.textContent = pomoRunning ? "⏸" : "▶";
  if (lblEl)  lblEl.textContent = pomoIsBreak ? "MOLA" : "ÇALIŞMA";
  if (fill)   { fill.style.width = Math.round(pomoSeconds/pomoTotal*100)+"%"; fill.className = "pomo-fill "+(pomoIsBreak?"break":"work"); }
}

function togglePomo() {
  if (pomoRunning) {
    clearInterval(pomoInterval);
    pomoRunning = false;
  } else {
    pomoRunning = true;
    pomoInterval = setInterval(function() {
      pomoSeconds--;
      if (pomoSeconds <= 0) {
        clearInterval(pomoInterval);
        pomoRunning = false;
        pomoIsBreak = !pomoIsBreak;
        pomoTotal = pomoSeconds = pomoIsBreak ? 300 : 1500;
        toast(pomoIsBreak ? "☕ Mola! 5 dakika." : "💪 Çalışma! 25 dakika.", 4000);
      }
      updatePomoUI();
    }, 1000);
  }
  updatePomoUI();
}

function resetPomo() {
  clearInterval(pomoInterval);
  pomoRunning = false; pomoIsBreak = false;
  pomoTotal = pomoSeconds = 1500;
  updatePomoUI();
}

// ═══════════════════════════════════════════════════════════════
// JSON IMPORT
// ═══════════════════════════════════════════════════════════════
function applyJson(json, mode) {
  var parsed;
  try { parsed = JSON.parse(json); } catch(e) { return "Geçersiz JSON: "+e.message; }
  var blocks = Array.isArray(parsed) ? parsed : [parsed];
  var newData = mode === "replace" ? {} : JSON.parse(JSON.stringify(data));
  for (var bi = 0; bi < blocks.length; bi++) {
    var block = blocks[bi];
    var tid = block.track;
    if (!tid) return "'track' alanı zorunlu.";
    if (!newData[tid]) {
      newData[tid] = { meta: { label:block.trackLabel||tid, icon:block.icon||"📋", color:block.color||"#818cf8", cls:block.cls||"dp100" }, sections:[] };
    }
    if (block.section && block.items) {
      var ex = null;
      for (var si = 0; si < newData[tid].sections.length; si++) {
        if (newData[tid].sections[si].title === block.section) { ex = newData[tid].sections[si]; break; }
      }
      if (ex && mode === "merge") {
        var ids = {};
        ex.items.forEach(function(i){ ids[i.id] = true; });
        block.items.forEach(function(item){ if (!ids[item.id]) ex.items.push(item); });
      } else {
        newData[tid].sections.push({title:block.section, items:block.items});
      }
    }
  }
  data = newData;
  activeTrack = Object.keys(data)[0] || "";
  render();
  return null;
}

// AI
// ═══════════════════════════════════════════════════════════════
function callAI(messages, jsonMode, callback) {
  var msgs = typeof messages === "string" ? [{role:"user",content:messages}] : messages;
  fetch("/api/ai", {
    method: "POST",
    headers: {"Content-Type":"application/json","Authorization":"Bearer "+(window._authToken||"")},
    body: JSON.stringify({messages:msgs, jsonMode:!!jsonMode})
  }).then(function(res) {
    if (res.status === 401) { localStorage.removeItem("skill_token"); window.location.replace("/login.html"); return; }
    return res.json();
  }).then(function(d) {
    if (!d) return;
    if (d.error) { callback(null, d.error); return; }
    callback(d.content, null);
  }).catch(function(e) { callback(null, e.message); });
}

function buildCtx() {
  var lines = ["Tarih: "+new Date().toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long"}), "Streak: "+streak+" gün"];
  Object.keys(data).forEach(function(tid) {
    var t = data[tid], m = t.meta||{};
    var all = (t.sections||[]).reduce(function(a,s){ return a.concat(s.items); },[]);
    var done = all.filter(function(i){ return checked[i.id]; });
    lines.push("\n["+m.icon+" "+m.label+"] "+done.length+"/"+all.length+" (%"+Math.round(done.length/Math.max(all.length,1)*100)+")");
    var weak = (t.sections||[]).map(function(s){ return {title:s.title,done:s.items.filter(function(i){ return checked[i.id]; }).length,total:s.items.length}; })
      .filter(function(s){ return s.total>0 && s.done/s.total<0.3; }).slice(0,2);
    if (weak.length) lines.push("  Zayıf: "+weak.map(function(s){ return '"'+s.title+'" '+s.done+'/'+s.total; }).join(", "));
  });
  return lines.join("\n");
}

function generateCoachPlan() {
  var selectedTracks = [];
  document.querySelectorAll(".track-sel:checked").forEach(function(cb){ selectedTracks.push(cb.value); });
  if (!selectedTracks.length) { alert("En az bir track seç."); return; }

  document.getElementById("coachBody").innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;gap:16px;padding:40px 20px;color:var(--muted)"><div class="spinner"></div><span>Plan hazırlanıyor...</span></div>';

  var context = selectedTracks.map(function(tid) {
    var t = data[tid]; if (!t) return null;
    var m = t.meta||{};
    var sections = (t.sections||[]).map(function(sec) {
      var unticked = sec.items.filter(function(i){ return !checked[i.id]; });
      return unticked.length ? {bolum:sec.title, gorevler:unticked.map(function(i){ return {id:i.id,metin:i.text}; })} : null;
    }).filter(Boolean);
    return sections.length ? {track:tid, ad:m.label||tid, ikon:m.icon||"", bolumler:sections} : null;
  }).filter(Boolean);

  if (!context.length) {
    document.getElementById("coachBody").innerHTML = '<p style="color:var(--muted);padding:20px;font-size:13px">Seçili track\'lerde tamamlanmamış madde yok 🎉</p>';
    return;

  var sys = "Sen Tarik'in öğrenme koçusun. TU Münih MSc (Eylül 2026), Rohde & Schwarz PMO, Almanca/AI/ML öğreniyor. Türkçe, net ve motive edici ol.";
  var usr = "Öğrenci "+coachMinutes+" dakika çalışacak. Tamamlanmamış görevler:\n"+JSON.stringify(context,null,2)+"\n\nSadece JSON ver:\n{\"motivasyon\":\"1 kısa cümle\",\"plan\":[{\"sira\":1,\"track_id\":\"id\",\"bolum\":\"bölüm\",\"gorev\":\"görev metni\",\"sure\":20,\"neden\":\"neden öncelikli\"}]}";

  callAI([{role:"system",content:sys},{role:"user",content:usr}], true, function(raw, err) {
    if (err) { document.getElementById("coachBody").innerHTML = '<p style="color:#f87171;padding:20px">'+err+'</p>'; return; }
    var r;
    try { r = JSON.parse(raw); } catch(e) { document.getElementById("coachBody").innerHTML = '<p style="color:#f87171;padding:20px">JSON parse hatası</p>'; return; }
    renderCoachPlan(r);
  });
}

    body.innerHTML =
      '<div class="radio-row">'+
        '<label class="radio-label"><input type="radio" name="mode" value="merge" checked onchange="currentMode=\'merge\'"> Mevcut üzerine ekle</label>'+
        '<label class="radio-label"><input type="radio" name="mode" value="replace" onchange="currentMode=\'replace\'"> Tamamını değiştir</label>'+
      '</div>'+
      '<label class="file-btn">📁 Dosyadan Aç<input type="file" accept=".json" style="display:none" onchange="readFile(this)"></label>'+
      '<textarea id="jsonInput" rows="9" placeholder=\'{"track":"german","section":"Konu","items":[...]}\' style="margin-bottom:0"></textarea>'+
      '<div id="jsonErr" class="error-msg"></div>'+
      '<button class="apply-btn" onclick="submitJson()">Uygula</button>';
  }

  if (type === "firebase") {
    title.textContent = "☁ Firebase Sync";
    var savedKey = "";
    try { savedKey = localStorage.getItem("skt_fb_key") || ""; } catch(e) {}
    body.innerHTML = "";
    var hint = document.createElement("p"); hint.className = "hint";
    hint.innerHTML = "<strong>1.</strong> console.firebase.google.com → New project<br><strong>2.</strong> Realtime Database → Test mode<br><strong>3.</strong> Project Settings → Web app → Config'i kopyala";
    var lbl1 = document.createElement("label"); lbl1.className = "settings-label"; lbl1.textContent = "Firebase Config";
    var ta = document.createElement("textarea"); ta.id = "fbCfg"; ta.rows = 7; ta.placeholder = '{"apiKey":"AIza...","databaseURL":"https://...","projectId":"..."}';
    var lbl2 = document.createElement("label"); lbl2.className = "settings-label"; lbl2.textContent = "Sync Key";
    var inp = document.createElement("input"); inp.type = "text"; inp.id = "fbKey"; inp.placeholder = "tarik2026"; inp.value = savedKey;
    var errDiv = document.createElement("div"); errDiv.id = "fbErr"; errDiv.className = "error-msg";
    var btn = document.createElement("button"); btn.className = "apply-btn"; btn.textContent = "Bağlan";
    btn.onclick = submitFirebase;
    body.append(hint, lbl1, ta, lbl2, inp, errDiv, btn);
    if (db) {
      var disc = document.createElement("button");
      disc.style.cssText = "width:100%;margin-top:8px;padding:12px;border-radius:10px;border:1px solid var(--border);background:none;color:var(--muted);cursor:pointer;font-family:inherit;font-size:13px";
      disc.textContent = "Bağlantıyı Kes"; disc.onclick = disconnectFirebase;
      body.append(disc);
    }
  }

  if (type === "format") {
    title.textContent = "JSON Format";
    body.innerHTML = '<p class="hint">Claude\'dan "dbt için JSON yaz" gibi iste, kopyala-yapıştır.</p>'+
      '<pre class="format-block">// Bölüm ekle:\n{\n  "track": "german",\n  "section": "B2 İleri",\n  "items": [\n    {"id":"x01","text":"Görev","note":"İpucu"}\n  ]\n}\n\n// Yeni track:\n{\n  "track": "dbt",\n  "trackLabel": "dbt",\n  "icon": "🔧",\n  "color": "#34d399",\n  "section": "Kurulum",\n  "items": [{"id":"d01","text":"dbt kur"}]\n}</pre>';
  }
}

function submitFirebase() {
  var raw = document.getElementById("fbCfg").value.trim();
  var key = document.getElementById("fbKey").value.trim();
  var errEl = document.getElementById("fbErr");
  if (!raw) { errEl.textContent = "⚠ Config boş"; return; }
  if (!key) { errEl.textContent = "⚠ Sync key boş"; return; }
  var cfg;
  try {
    var normalized = raw.replace(/([{,]\s*)([a-zA-Z_]\w*)\s*:/g, '$1"$2":');
    cfg = JSON.parse(normalized);
  } catch(e) { errEl.textContent = "⚠ JSON hatası: "+e.message; return; }
  if (!cfg.databaseURL) { errEl.textContent = "⚠ databaseURL bulunamadı"; return; }
  errEl.textContent = "";
  connectFirebase(cfg, key);
  closeModal();
  toast("☁ Bağlanıyor...", 2000);
}

function disconnectFirebase() {
  if (db) { try { db.ref(syncKey).off(); } catch(e) {} }
  db = null; syncKey = "";
  try { localStorage.removeItem("skt_fb_config"); localStorage.removeItem("skt_fb_key"); } catch(e) {}
  setSyncStatus("nokey");
  closeModal();
}

function closeModal() { document.getElementById("modalOverlay").style.display = "none"; }
function readFile(input) {
  var r = new FileReader();
  r.onload = function(e) { document.getElementById("jsonInput").value = e.target.result; };
  r.readAsText(input.files[0]);
}
function submitJson() {
  var err = applyJson(document.getElementById("jsonInput").value.trim(), currentMode);
  if (err) { document.getElementById("jsonErr").textContent = "⚠ "+err; return; }
  closeModal();
}

function logout() { localStorage.removeItem("skill_token"); window.location.replace("/login.html"); }

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
load();
render();
updatePomoUI();
setSyncStatus(db ? "syncing" : "nokey");
</script>
