<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Skill Tracker">
<meta name="theme-color" content="#0f0f0f">
<link rel="manifest" href="/manifest.json">
<title>Skill Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #0f0f0f; --surface: #1a1a1a; --surface2: #222; --border: #2a2a2a;
  --text: #f0f0f0; --muted: #666; --subtle: #333;
  --radius: 12px; --radius-sm: 8px;
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 80px; overscroll-behavior: none; }

/* Header */
.header { position: sticky; top: 0; z-index: 50; background: rgba(15,15,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.header-left { display: flex; align-items: center; gap: 8px; min-width: 0; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; white-space: nowrap; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.sync-dot.synced { background: #34d399; } .sync-dot.syncing { background: #f59e0b; animation: pulse 1s infinite; } .sync-dot.offline { background: #f87171; } .sync-dot.nokey { background: #444; }
.streak-badge { display: flex; align-items: center; gap: 3px; padding: 2px 8px; border-radius: 20px; background: rgba(245,158,11,0.15); border: 1px solid rgba(245,158,11,0.3); font-size: 11px; font-weight: 700; color: #f59e0b; white-space: nowrap; }
.header-btns { display: flex; gap: 6px; flex-shrink: 0; }
.icon-btn { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface); color: var(--text); font-size: 15px; cursor: pointer; display: flex; align-items: center; justify-content: center; }

/* Pomodoro bar */
.pomo-sticky { position: sticky; top: 57px; z-index: 49; background: rgba(15,15,15,0.95); backdrop-filter: blur(12px); border-bottom: 1px solid var(--border); padding: 8px 16px; display: flex; align-items: center; gap: 10px; }
.pomo-label { font-size: 10px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
.pomo-time { font-family: 'DM Mono', monospace; font-size: 17px; font-weight: 700; min-width: 48px; }
.pomo-time.work  { color: #818cf8; }
.pomo-time.break { color: #34d399; }
.pomo-btn { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: 13px; padding: 4px 10px; cursor: pointer; }
.pomo-progress { flex: 1; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.pomo-fill { height: 100%; border-radius: 2px; transition: width 1s linear; }
.pomo-fill.work  { background: #818cf8; }
.pomo-fill.break { background: #34d399; }

/* Track tabs */
.track-tabs { display: flex; gap: 6px; padding: 10px 12px; flex-wrap: wrap; }
.track-tab { flex: 1 1 110px; max-width: 150px; padding: 8px 10px; border-radius: var(--radius); border: 1.5px solid var(--border); background: var(--surface); cursor: pointer; transition: border-color 0.15s, background 0.15s; }
.track-tab-icon { font-size: 16px; margin-bottom: 2px; }
.track-tab-label { font-size: 11px; font-weight: 700; }
.track-tab-bar { height: 3px; background: var(--subtle); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.track-tab-fill { height: 100%; border-radius: 2px; transition: width 0.4s; }
.track-tab-pct { font-size: 10px; font-weight: 700; margin-top: 3px; font-family: 'DM Mono', monospace; }

/* Sections */
.sections { padding: 0 12px; }
.section { margin-bottom: 8px; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
.section-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; background: var(--surface); user-select: none; }
.section-title { flex: 1; font-size: 13px; font-weight: 700; }
.section-badge { font-size: 10px; font-family: 'DM Mono', monospace; }
.section-arrow { font-size: 10px; color: var(--muted); }

/* Todo items */
.todo-item { display: flex; gap: 10px; padding: 10px 14px; cursor: pointer; align-items: flex-start; border-top: 1px solid var(--border); background: var(--surface); transition: background 0.1s; position: relative; }
.todo-item:active { background: var(--subtle); }
.checkbox { width: 18px; height: 18px; border-radius: 5px; flex-shrink: 0; margin-top: 1px; border: 2px solid var(--subtle); background: transparent; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
.checkbox svg { display: none; }
.todo-text { font-size: 13px; line-height: 1.5; flex: 1; }
.todo-text.done { color: var(--muted); text-decoration: line-through; }
.todo-note { font-size: 11px; color: var(--muted); margin-top: 3px; }
.user-desc { font-size: 12px; color: #888; margin-top: 4px; line-height: 1.5; white-space: pre-wrap; }
.edit-btn { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 13px; padding: 2px 4px; flex-shrink: 0; opacity: 0; transition: opacity 0.15s; margin-top: 1px; }
.todo-item:hover .edit-btn { opacity: 0.6; }
.todo-item:active .edit-btn { opacity: 1; }
/* Always show on mobile (no hover) */
@media (hover: none) { .edit-btn { opacity: 0.35; } }
.desc-textarea { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 6px; padding: 8px; font-size: 12px; font-family: 'DM Sans', sans-serif; resize: none; outline: none; margin-top: 6px; line-height: 1.5; min-height: 60px; }
.desc-textarea:focus { border-color: #818cf8; }
.desc-actions { display: flex; gap: 6px; margin-top: 6px; }
.desc-save { padding: 5px 14px; border-radius: 6px; border: none; background: #818cf8; color: #000; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.desc-cancel { padding: 5px 14px; border-radius: 6px; border: 1px solid var(--border); background: none; color: var(--muted); font-size: 11px; cursor: pointer; font-family: 'DM Sans', sans-serif; }

/* Empty */
.empty { text-align: center; padding: 50px 20px; color: var(--muted); }
.empty-icon { font-size: 36px; margin-bottom: 10px; }

/* Bottom bar */
.bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15,15,15,0.97); backdrop-filter: blur(12px); border-top: 1px solid var(--border); padding: 10px 14px calc(10px + env(safe-area-inset-bottom)); display: flex; gap: 8px; }
.btn { flex: 1; padding: 12px 8px; border-radius: var(--radius); border: none; font-weight: 700; font-size: 13px; cursor: pointer; font-family: 'DM Sans', sans-serif; white-space: nowrap; }
.btn-ghost { background: var(--surface); color: var(--text); border: 1px solid var(--border); flex: 0; padding: 12px 14px; }

/* Toast */
.toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: #34d399; color: #000; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 700; z-index: 300; display: none; }

/* Modal */
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: flex-end; justify-content: center; z-index: 100; }
.modal { background: var(--surface); border-radius: 20px 20px 0 0; width: 100%; max-width: 640px; max-height: 90vh; display: flex; flex-direction: column; padding-bottom: env(safe-area-inset-bottom); }
.modal-handle { width: 36px; height: 4px; background: var(--subtle); border-radius: 2px; margin: 12px auto 0; flex-shrink: 0; }
.modal-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px 10px; flex-shrink: 0; border-bottom: 1px solid var(--border); }
.modal-title { font-size: 15px; font-weight: 700; }
.modal-close { background: none; border: none; color: var(--muted); font-size: 20px; cursor: pointer; }
.modal-body { padding: 16px 20px 20px; overflow-y: auto; flex: 1; }

/* Modal elements */
textarea { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: 'DM Mono', monospace; font-size: 12px; resize: vertical; line-height: 1.6; outline: none; }
textarea:focus { border-color: #818cf8; }
input[type="text"], input[type="password"] { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; font-family: 'DM Mono', monospace; font-size: 12px; outline: none; }
input:focus { border-color: #818cf8; }
.apply-btn { width: 100%; padding: 13px; border-radius: var(--radius); border: none; background: #818cf8; color: #000; font-weight: 700; font-size: 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; margin-top: 12px; }
.radio-row { display: flex; gap: 16px; margin-bottom: 12px; }
.radio-label { display: flex; align-items: center; gap: 6px; font-size: 13px; cursor: pointer; }
input[type="radio"] { accent-color: #818cf8; }
.hint { font-size: 12px; color: var(--muted); line-height: 1.6; margin-bottom: 12px; }
.settings-label { font-size: 12px; font-weight: 600; color: var(--muted); margin-bottom: 6px; display: block; }
.file-btn { display: inline-block; padding: 8px 14px; border-radius: var(--radius-sm); border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 12px; cursor: pointer; margin-bottom: 10px; }
.error-msg { color: #f87171; font-size: 12px; margin-top: 8px; }
pre.format-block { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; font-family: 'DM Mono', monospace; font-size: 11px; overflow-x: auto; line-height: 1.7; color: #a3e635; white-space: pre-wrap; word-break: break-word; }

/* Section check */
.sec-check-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); cursor: pointer; }
.sec-check-row:last-child { border-bottom: none; }
.sec-check-label { flex: 1; font-size: 13px; }
.sec-check-count { font-size: 11px; color: var(--muted); font-family: 'DM Mono', monospace; }

/* Coach panel */
.coach-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 200; display: flex; flex-direction: column; justify-content: flex-end; }
.coach-panel { background: var(--surface); border-radius: 20px 20px 0 0; max-height: 90vh; overflow-y: auto; padding-bottom: env(safe-area-inset-bottom); }
.coach-handle { width: 36px; height: 4px; background: var(--subtle); border-radius: 2px; margin: 12px auto 0; }
.coach-header { padding: 14px 20px 10px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
.coach-title { font-size: 16px; font-weight: 700; }
.coach-body { padding: 16px 20px 24px; }
.coach-section { margin-bottom: 20px; }
.coach-section-title { font-size: 10px; font-weight: 700; color: var(--muted); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.plan-item { display: flex; gap: 10px; padding: 10px 12px; border-radius: 10px; background: var(--bg); border: 1px solid var(--border); margin-bottom: 6px; }
.plan-item-track { font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 10px; display: inline-block; width: fit-content; margin-bottom: 3px; }
.plan-item-text { font-size: 13px; line-height: 1.4; }
.plan-item-why { font-size: 11px; color: var(--muted); margin-top: 2px; }
.plan-item-dur { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; padding-top: 2px; }
.new-task-card { border: 1px solid var(--border); border-radius: 10px; margin-bottom: 8px; overflow: hidden; }
.new-task-header { padding: 10px 12px; background: var(--bg); display: flex; align-items: center; gap: 8px; }
.new-task-items { padding: 8px 12px 10px; }
.new-task-item { font-size: 12px; padding: 3px 0; display: flex; gap: 6px; }
.add-tasks-btn { margin-top: 8px; padding: 7px 14px; border-radius: 8px; border: none; font-size: 12px; font-weight: 700; cursor: pointer; font-family: 'DM Sans', sans-serif; }
.mini-q { padding: 10px 0; border-bottom: 1px solid var(--border); font-size: 13px; line-height: 1.6; }
.mini-q:last-child { border-bottom: none; }
.coach-loading { display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 40px 20px; color: var(--muted); }
.coach-spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: #ec4899; border-radius: 50%; animation: spin 0.8s linear infinite; }

/* Daily route panel */
.route-item { display: flex; gap: 12px; padding: 12px 0; border-bottom: 1px solid var(--border); }
.route-item:last-child { border-bottom: none; }
.route-time { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); white-space: nowrap; width: 60px; flex-shrink: 0; padding-top: 2px; }
.route-content { flex: 1; }
.route-track { font-size: 10px; font-weight: 700; padding: 1px 6px; border-radius: 8px; display: inline-block; margin-bottom: 3px; }
.route-task { font-size: 13px; font-weight: 500; line-height: 1.4; }
.route-why { font-size: 11px; color: var(--muted); margin-top: 2px; }
.route-dur { font-size: 11px; font-family: 'DM Mono', monospace; color: var(--muted); flex-shrink: 0; padding-top: 2px; }

/* Test output */
.test-output { margin: 0 12px 12px; border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.test-header { display: flex; justify-content: space-between; align-items: center; padding: 10px 14px; background: var(--surface); font-size: 12px; font-weight: 700; }
.test-body { padding: 14px; font-size: 12.5px; line-height: 1.8; white-space: pre-wrap; max-height: 400px; overflow-y: auto; background: var(--bg); }

/* Dots loader */
.dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--muted); animation: pulse 1s ease-in-out infinite; }
.dot:nth-child(2) { animation-delay: 0.2s; } .dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:1} }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<!-- Header -->

<script>
// ── State ─────────────────────────────────────────────────────
let data = {}, checked = {}, userDescs = {};
let activeTrack = "";
let db = null, syncKey = "", saveTimer = null, remoteListener = null, ignoreRemote = false;
let streak = 0, lastActiveDate = "";
let allCollapsed = false, editingId = null;
let pomoSeconds = 25*60, pomoTotal = 25*60, pomoRunning = false, pomoInterval = null, pomoIsBreak = false;

// ── Firebase ──────────────────────────────────────────────────
function setSyncStatus(s) {
  const dot = document.getElementById("syncDot");
  if (!dot) return;
  dot.className = "sync-dot " + s;
}

function initFirebase(config, key) {
  try {
    if (!firebase.apps.length) firebase.initializeApp(config);
    db = firebase.database(); syncKey = key;
    try { localStorage.setItem("skt_fb_config", JSON.stringify(config)); } catch {}
    try { localStorage.setItem("skt_fb_key", key); } catch {}
    startListener(); setSyncStatus("syncing");
  } catch(e) { alert("Firebase hatası: " + e.message); }
}

function startListener() {
  if (!db || !syncKey) return;
  db.ref(syncKey).on("value", snap => {
    if (ignoreRemote) return;
    const val = snap.val();
    if (!val) { pushFB(); return; }
    if (val.data)      { data      = val.data;      saveLocal("skt_data", data); }
    if (val.checked)   { checked   = val.checked;   saveLocal("skt_checked", checked); }
    if (val.userDescs) { userDescs = val.userDescs; saveLocal("skt_descs", userDescs); }
    if (!activeTrack || !data[activeTrack]) activeTrack = Object.keys(data)[0] || "";
    render(); setSyncStatus("synced");
  }, () => setSyncStatus("offline"));
}

function pushFB() {
  if (!db || !syncKey) return;
  ignoreRemote = true; setSyncStatus("syncing");
  db.ref(syncKey).set({ data, checked, userDescs })
    .then(() => setSyncStatus("synced"))
    .catch(() => setSyncStatus("offline"))
    .finally(() => setTimeout(() => ignoreRemote = false, 300));
}

// ── Persistence ───────────────────────────────────────────────
function saveLocal(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function save() {
  saveLocal("skt_data", data); saveLocal("skt_checked", checked); saveLocal("skt_descs", userDescs);
  try { localStorage.setItem("skt_streak", String(streak)); localStorage.setItem("skt_last_date", lastActiveDate); } catch {}
  if (db && syncKey) { clearTimeout(saveTimer); saveTimer = setTimeout(pushFB, 800); }
}

function load() {
  try { const d = localStorage.getItem("skt_data");    if (d) data      = JSON.parse(d); } catch {}
  try { const c = localStorage.getItem("skt_checked"); if (c) checked   = JSON.parse(c); } catch {}
  try { const u = localStorage.getItem("skt_descs");   if (u) userDescs = JSON.parse(u); } catch {}
  try { streak = parseInt(localStorage.getItem("skt_streak") || "0"); } catch {}
  try { lastActiveDate = localStorage.getItem("skt_last_date") || ""; } catch {}
  if (!Object.keys(data).length) data = JSON.parse(JSON.stringify(DEFAULT_DATA));
  activeTrack = Object.keys(data)[0] || "";
  try {
    const cfg = localStorage.getItem("skt_fb_config");
    const key = localStorage.getItem("skt_fb_key");
    if (cfg && key) initFirebase(JSON.parse(cfg), key);
  } catch {}
}

// ── Computed ──────────────────────────────────────────────────
const allItems  = tid => (data[tid]?.sections || []).flatMap(s => s.items);
const doneCount = tid => allItems(tid).filter(i => checked[i.id]).length;
const pct       = tid => { const t = allItems(tid).length; return t ? Math.round(doneCount(tid)/t*100) : 0; };
const trackColor= tid => data[tid]?.meta?.color || "#818cf8";
const trackCls  = tid => data[tid]?.meta?.cls   || "dp100";

// ── Render ────────────────────────────────────────────────────
function render() { renderTabs(); renderSections(); updateStreak(); save(); }

function renderTabs() {
  document.getElementById("trackTabs").innerHTML = Object.entries(data).map(([tid, t]) => {
    const m = t.meta || {}; const p = pct(tid);
    const active = tid === activeTrack ? `border-color:${m.color||'#818cf8'};background:${(m.color||'#818cf8')}15` : "";
    return `<div class="track-tab" style="${active}" onclick="selectTrack('${tid}')">
      <div class="track-tab-icon">${m.icon||"📋"}</div>
      <div class="track-tab-label">${m.label||tid}</div>
      <div class="track-tab-bar"><div class="track-tab-fill" style="width:${p}%;background:${m.color||'#818cf8'}"></div></div>
      <div class="track-tab-pct" style="color:${m.color||'#818cf8'}">${doneCount(tid)}/${allItems(tid).length} · ${p}%</div>
    </div>`;
  }).join("");
}

let collapsed = {};
function renderSections() {
  const t = data[activeTrack]; const color = trackColor(activeTrack); const cls = trackCls(activeTrack);
  const container = document.getElementById("sectionsContainer");
  if (!t?.sections?.length) {
    container.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><p>Bu track boş.<br>+ JSON Yükle ile ekle.</p></div>`; return;
  }
  container.innerHTML = (t.sections || []).map((sec, si) => {
    const sk = `${activeTrack}-${si}`;
    const isCol = allCollapsed || collapsed[sk];
    const secDone = sec.items.filter(i => checked[i.id]).length;
    const allDone = secDone === sec.items.length && sec.items.length > 0;
    const hdrStyle = allDone ? `background:${color}15;border-bottom:1px solid ${color}30` : "";
    const items = isCol ? "" : sec.items.map(item => {
      const ck = !!checked[item.id]; const desc = userDescs[item.id] || ""; const isEd = editingId === item.id;
      const chkStyle = ck ? `background:${color};border-color:${color}` : "";
      const chkCls   = ck ? "done" : "";
      return `<div class="todo-item ${ck ? 'checked-item' : ''}" id="item-${item.id}" style="${ck ? `background:${color}10` : ''}">
        <div class="checkbox" style="${chkStyle}" onclick="toggleItem('${item.id}')">
          ${ck ? `<svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4L3.5 6.5L9 1" stroke="#000" stroke-width="2" stroke-linecap="round"/></svg>` : ""}
        </div>
        <div style="flex:1;min-width:0" onclick="${isEd ? '' : `toggleItem('${item.id}')`}">
          <div class="todo-text ${chkCls}">${item.text}</div>
          ${item.note && !isEd ? `<div class="todo-note">💡 ${item.note}</div>` : ""}
          ${desc && !isEd ? `<div class="user-desc">${desc}</div>` : ""}
          ${isEd ? `<textarea class="desc-textarea" id="desc-${item.id}" onclick="event.stopPropagation()">${desc}</textarea>
            <div class="desc-actions" onclick="event.stopPropagation()">
              <button class="desc-save" onclick="saveDesc('${item.id}')">Kaydet</button>
              <button class="desc-cancel" onclick="cancelEdit()">İptal</button>
            </div>` : ""}
        </div>
        <button class="edit-btn" onclick="event.stopPropagation();startEdit('${item.id}')">✏️</button>
      </div>`;
    }).join("");
    return `<div class="section">
      <div class="section-header" style="${hdrStyle}" onclick="toggleSection('${sk}')">
        <span class="section-title">${sec.title}</span>
        <span class="section-badge" style="color:${color}">${secDone}/${sec.items.length}</span>
        <span class="section-arrow">${isCol ? "▼" : "▲"}</span>
      </div>${items}
    </div>`;
  }).join("");
}

function selectTrack(tid) { activeTrack = tid; render(); }
function toggleSection(sk) { collapsed[sk] = !collapsed[sk]; renderSections(); }
function toggleAllSections() {
  allCollapsed = !allCollapsed;
  document.getElementById("collapseBtn").style.opacity = allCollapsed ? "1" : "0.7";
  renderSections();
}

function toggleItem(id) {
  checked[id] = !checked[id]; updateStreak(); render();
}

// ── Edit ──────────────────────────────────────────────────────
function startEdit(id) { editingId = id; renderSections(); setTimeout(() => { const ta = document.getElementById("desc-"+id); if (ta) { ta.focus(); ta.setSelectionRange(ta.value.length, ta.value.length); } }, 50); }
function saveDesc(id) { const ta = document.getElementById("desc-"+id); if (!ta) return; const v = ta.value.trim(); if (v) userDescs[id] = v; else delete userDescs[id]; editingId = null; save(); renderSections(); }
function cancelEdit() { editingId = null; renderSections(); }

// ── Streak ────────────────────────────────────────────────────
function updateStreak() {
  const today = new Date().toISOString().slice(0,10);
  if (lastActiveDate !== today && Object.values(checked).some(Boolean)) {
    const yesterday = new Date(Date.now()-86400000).toISOString().slice(0,10);
    streak = (lastActiveDate === yesterday) ? streak+1 : 1;
    lastActiveDate = today;
  }
  const el = document.getElementById("streakBadge"); if (el) el.textContent = `🔥 ${streak}`;
}

// ── Pomodoro ──────────────────────────────────────────────────
function updatePomoUI() {
  const m = Math.floor(pomoSeconds/60).toString().padStart(2,"0");
  const s = (pomoSeconds%60).toString().padStart(2,"0");
  document.getElementById("pomoTime").textContent = `${m}:${s}`;
  document.getElementById("pomoTime").className = `pomo-time ${pomoIsBreak?"break":"work"}`;
  document.getElementById("pomoBtnEl").textContent = pomoRunning ? "⏸" : "▶";
  document.getElementById("pomoLabel").textContent = pomoIsBreak ? "MOLA" : "ÇALIŞMA";
  const fill = document.getElementById("pomoFill");
  fill.style.width = (pomoSeconds/pomoTotal*100)+"%";
  fill.className = `pomo-fill ${pomoIsBreak?"break":"work"}`;
}
function togglePomo() {
  if (pomoRunning) { clearInterval(pomoInterval); pomoRunning = false; }
  else {
    pomoRunning = true;
    pomoInterval = setInterval(() => {
      pomoSeconds--;
      if (pomoSeconds <= 0) {
        clearInterval(pomoInterval); pomoRunning = false;
        pomoIsBreak = !pomoIsBreak;
        pomoTotal = pomoSeconds = pomoIsBreak ? 5*60 : 25*60;
        toast(pomoIsBreak ? "☕ Mola! 5 dakika." : "💪 Çalışma! 25 dakika.", 4000);
      }
      updatePomoUI();
    }, 1000);
  }
  updatePomoUI();
}
function resetPomo() { clearInterval(pomoInterval); pomoRunning = false; pomoIsBreak = false; pomoTotal = pomoSeconds = 25*60; updatePomoUI(); }

function exportChecked() {

  navigator.clipboard.writeText(text).then(()=>toast("✓ Kopyalandı")).catch(()=>prompt("Kopyala:", text));
}
function exportCheckedJson() {
  const result = Object.entries(data).map(([tid,t]) => {
    const done = (t.sections||[]).flatMap(s=>s.items.filter(i=>checked[i.id]).map(i=>({id:i.id,text:i.text})));
    return done.length ? {track:tid,trackLabel:t.meta?.label,completed:done} : null;
  }).filter(Boolean);
  if (!result.length) { alert("Tiklenmiş madde yok."); return; }
  const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(result,null,2)],{type:"application/json"})); a.download = "tamamlananlar.json"; a.click();
}
function exportData() {
  const a = document.createElement("a"); a.href = URL.createObjectURL(new Blob([JSON.stringify(data,null,2)],{type:"application/json"})); a.download = "skill_tracker_data.json"; a.click();
}

// ── JSON Import ───────────────────────────────────────────────
let currentMode = "merge";
function applyJson(json, mode) {
  let parsed; try { parsed = JSON.parse(json); } catch { return "Geçersiz JSON."; }
  const blocks = Array.isArray(parsed) ? parsed : [parsed];
  let newData = mode==="replace" ? {} : JSON.parse(JSON.stringify(data));
  for (const block of blocks) {
    const tid = block.track; if (!tid) return "'track' alanı zorunlu.";
    if (!newData[tid]) newData[tid] = { meta: { label:block.trackLabel||tid, icon:block.icon||"📋", color:block.color||"#818cf8", cls:block.cls||"dp100" }, sections: [] };
    if (block.section && block.items) {
      const ex = newData[tid].sections.find(s=>s.title===block.section);
      if (ex && mode==="merge") { const ids = new Set(ex.items.map(i=>i.id)); block.items.forEach(item=>{if(!ids.has(item.id))ex.items.push(item);}); }
      else newData[tid].sections.push({title:block.section,items:block.items});
    }
  }
  data = newData; activeTrack = Object.keys(data)[0]||""; render(); return null;
}

// ── OpenAI ────────────────────────────────────────────────────
async function callAI(messages, jsonMode=false) {
  const msgs = typeof messages==="string" ? [{role:"user",content:messages}] : messages;
  const res = await fetch("/api/ai", { method:"POST", headers:{"Content-Type":"application/json","Authorization":"Bearer "+(window._authToken||"")}, body:JSON.stringify({messages:msgs,jsonMode}) });
  if (res.status===401) { localStorage.removeItem("skill_token"); window.location.replace("/login.html"); throw new Error("Auth expired"); }
  const d = await res.json(); if (d.error) throw new Error(d.error); return d.content;
}

function buildCtx() {
  const lines = [`Tarih: ${new Date().toLocaleDateString("tr-TR",{weekday:"long",day:"numeric",month:"long"})}`, `Streak: ${streak} gün`];
  for (const [tid, t] of Object.entries(data)) {
    const m = t.meta||{}; const all = (t.sections||[]).flatMap(s=>s.items); const done = all.filter(i=>checked[i.id]);
    lines.push(`\n[${m.icon} ${m.label}] ${done.length}/${all.length} (${Math.round(done.length/Math.max(all.length,1)*100)}%)`);
    const weak = (t.sections||[]).map(s=>({title:s.title,done:s.items.filter(i=>checked[i.id]).length,total:s.items.length})).filter(s=>s.total>0&&s.done/s.total<0.3).slice(0,2);
    if (weak.length) lines.push(`  Zayıf: ${weak.map(s=>`"${s.title}" ${s.done}/${s.total}`).join(", ")}`);
    const next = all.filter(i=>!checked[i.id]).slice(0,3).map(i=>`"${i.text.slice(0,50)}"`);
    if (next.length) lines.push(`  Sıradaki: ${next.join(", ")}`);
  }
  return lines.join("\n");
}

  const usr = `${buildCtx()}\n\nJSON ver:\n{"motivation":"1-2 cümle","plan":[{"track":"id","task":"iş","duration":"15 dk","why":"neden"}],"new_tasks":[{"track":"id","section":"bölüm","items":[{"id":"uid","text":"görev","note":"ipucu"}]}],"mini_test":{"topic":"konu","questions":["s1","s2","s3"]}}\n\nPlan ~60 dk, zayıf alanlara öncelik, new_tasks sadece boşluk varsa.`;

function renderCoach(coach) {
  const tc = Object.fromEntries(Object.entries(data).map(([tid,t])=>[tid,t.meta?.color||"#818cf8"]));
  let html = "";
  if (coach.motivation) html += `<div style="padding:12px;background:rgba(236,72,153,0.1);border:1px solid rgba(236,72,153,0.3);border-radius:10px;margin-bottom:16px;font-size:13px;line-height:1.6">${coach.motivation}</div>`;
  if (coach.plan?.length) {
    html += `<div class="coach-section"><div class="coach-section-title">⏱ 1 Saatlik Plan</div>`;
    let total = 0;
    coach.plan.forEach(item=>{
      const mins = parseInt(item.duration)||15; total += mins;
      const c = tc[item.track]||"#818cf8"; const m = data[item.track]?.meta||{};
      html += `<div class="plan-item"><div style="flex:1"><span class="plan-item-track" style="background:${c}20;color:${c}">${m.icon||""} ${m.label||item.track}</span><div class="plan-item-text">${item.task}</div><div class="plan-item-why">${item.why||""}</div></div><span class="plan-item-dur">${item.duration}</span></div>`;
    });
    html += `<div style="text-align:right;font-size:11px;color:var(--muted);margin-top:4px;font-family:'DM Mono',monospace">~${total} dk</div></div>`;
  }
  if (coach.new_tasks?.length) {
    html += `<div class="coach-section"><div class="coach-section-title">✨ Yeni Görev Önerileri</div>`;
    coach.new_tasks.forEach((g,gi)=>{
      const c = tc[g.track]||"#818cf8"; const m = data[g.track]?.meta||{};
      html += `<div class="new-task-card"><div class="new-task-header"><span style="font-size:13px;font-weight:700">${m.icon||""} ${g.section}</span><span style="font-size:11px;color:var(--muted)">${g.items?.length||0} görev</span></div><div class="new-task-items">${(g.items||[]).map(it=>`<div class="new-task-item"><span style="color:${c}">›</span> ${it.text}</div>`).join("")}<button class="add-tasks-btn" style="background:${c};color:#000" onclick="addCoachTasks(${gi})">+ Ekle</button></div></div>`;
    });
    html += `</div>`; window._coachTasks = coach.new_tasks;
  }
  if (coach.mini_test?.questions?.length) {
    html += `<div class="coach-section"><div class="coach-section-title">📝 Mini Test — ${coach.mini_test.topic}</div>`;
    coach.mini_test.questions.forEach((q,qi)=>{ html += `<div class="mini-q"><strong>${qi+1}.</strong> ${q}</div>`; });
    html += `<button class="apply-btn" style="margin-top:12px" onclick="expandTest('${(coach.mini_test.topic||"").replace(/'/g,"\\'")}')">Tam test oluştur →</button></div>`;
  }
  document.getElementById("coachBody").innerHTML = html;
}

function addCoachTasks(idx) {
  const g = window._coachTasks?.[idx]; if (!g) return;
  const err = applyJson(JSON.stringify(g), "merge"); if (err) { alert(err); return; }
  toast(`✓ ${g.items?.length||0} görev eklendi`);
  const btns = document.querySelectorAll(".add-tasks-btn"); if (btns[idx]) { btns[idx].textContent="✓ Eklendi"; btns[idx].disabled=true; btns[idx].style.opacity="0.5"; }
}

async function expandTest(topic) {
  closeCoach();
  const done = allItems(activeTrack).filter(i=>checked[i.id]).map(i=>i.text);
  if (!done.length) { alert("Tiklenmiş madde yok."); return; }
  const isGerman = activeTrack==="german";
  const prompt = isGerman
    ? `"${topic}" konusundan Almanca öğrencisi için 8 soruluk test: 3 çoktan seçmeli, 3 boşluk doldurma, 2 cümle yazma. Türkçe açıklamalı.\nTamamlanan konular:\n${done.slice(0,20).join("\n")}`
    : `"${topic}" topic. 8 test questions: 3 multiple choice, 3 short answer, 2 practical. Completed:\n${done.slice(0,20).join("\n")}`;
  showTestOutput(`📝 ${topic}`, prompt);
}

function selAll(v) { document.querySelectorAll("#secList input").forEach(cb=>cb.checked=v); }

async function runTest() {
  const t = data[activeTrack]; const m = t?.meta||{};
  const selected = [...document.querySelectorAll("#secList input")].map((cb,si)=>cb.checked?t.sections[si]:null).filter(Boolean);

    ? `Almanca öğrencisi şu konuları tamamladı:\n${done.join("\n")}\n\n8 soruluk test: 3 çoktan seçmeli (4 şık, doğrusu işaretli), 3 boşluk doldurma, 2 cümle yazma. Türkçe açıklamalı, Almanca pratikli. Her sorudan sonra kural hatırlatması.`
    : `Student completed:\n${done.join("\n")}\n\n8 questions: 3 multiple choice (mark correct), 3 short answer, 2 practical. Brief explanation after each.`;

    hdr.append(titleEl, cls);

function submitFirebase() {
  const raw = document.getElementById("fbCfg").value.trim();
  const key = document.getElementById("fbKey").value.trim();
  if (!key) { document.getElementById("fbErr").textContent="⚠ Key boş"; return; }
  let cfg; try { cfg = JSON.parse(raw.replace(/([{,]\s*)([a-zA-Z_]\w*)\s*:/g,'$1"$2":')); } catch { document.getElementById("fbErr").textContent="⚠ Geçersiz JSON"; return; }
  if (!cfg.databaseURL) { document.getElementById("fbErr").textContent="⚠ databaseURL eksik"; return; }
  initFirebase(cfg, key); closeModal();
}
function disconnectFirebase() { if(db) db.ref(syncKey).off(); db=null; syncKey=""; try{localStorage.removeItem("skt_fb_config");localStorage.removeItem("skt_fb_key");}catch{} setSyncStatus("nokey"); closeModal(); }

function closeModal() { document.getElementById("modalOverlay").style.display="none"; }
function readFile(input) { const r=new FileReader(); r.onload=e=>document.getElementById("jsonInput").value=e.target.result; r.readAsText(input.files[0]); }
function submitJson() { const err=applyJson(document.getElementById("jsonInput").value.trim(),currentMode); if(err){document.getElementById("jsonErr").textContent="⚠ "+err;return;} closeModal(); }

function logout() { localStorage.removeItem("skill_token"); window.location.replace("/login.html"); }
